<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Pop Off! 🍦 — Pillu & Crow's Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#fff0f5;--card:#fff;--text:#d6336c;--accent:#ff5d8f;--accent2:#ff8fb1;--gold:#ffd23f;--border:#ffd0e0;--shadow:rgba(255,150,190,.25);}
body.dark{--bg:#1a0010;--card:#2a0018;--text:#ff8fc0;--accent:#ff5d8f;--accent2:#b03060;--gold:#ffd23f;--border:#4a1030;--shadow:rgba(0,0,0,.4);}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,var(--bg),#ffe0ec);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s;}
body.dark{background:linear-gradient(160deg,#1a0010,#2a0018);}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-bottom:3px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
.top-bar h1{font-family:'Baloo 2',cursive;font-size:1.1rem;color:var(--accent);}
.tb{padding:5px 12px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:inherit;font-weight:800;font-size:.7rem;cursor:pointer;color:var(--text);transition:transform .1s;}
.tb:active{transform:scale(.92);}
.wrap{max-width:560px;margin:0 auto;padding:12px;}
.start{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:20px 12px;}
.start h2{font-family:'Baloo 2',cursive;font-size:2rem;color:var(--accent);text-shadow:2px 2px 0 var(--gold);}
.start p{font-size:.8rem;font-weight:700;color:var(--text);opacity:.85;max-width:340px;line-height:1.5;}
.pop-row{display:flex;gap:10px;justify-content:center;margin:6px 0;}
.pop-row canvas{width:64px;height:88px;}
.setup{background:var(--card);border:3px solid var(--border);border-radius:18px;padding:16px;width:min(94vw,360px);box-shadow:0 6px 20px var(--shadow);}
.setup label{font-size:.72rem;font-weight:800;display:block;margin:8px 0 3px;text-align:left;}
.setup input,.setup select{width:100%;padding:8px 10px;border-radius:10px;border:2px solid var(--border);font-family:inherit;font-weight:700;font-size:.8rem;background:var(--bg);color:var(--text);}
.row{display:flex;gap:8px;align-items:center;}
.row input{flex:1;}
.row select{width:96px;}
.toggle-grp{display:flex;gap:6px;}
.tgl{flex:1;padding:9px;border-radius:12px;border:2px solid var(--border);background:var(--bg);font-family:inherit;font-weight:800;font-size:.75rem;cursor:pointer;color:var(--text);transition:all .15s;}
.tgl.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 0 var(--accent2);}
.tgl:active{transform:scale(.95);}
.go-btn{width:100%;margin-top:14px;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--accent),#ff3d7f);color:#fff;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #d6336c;transition:all .12s;}
.go-btn:active{transform:translateY(5px);box-shadow:0 0 0 #d6336c;}
.score-bar{display:flex;gap:8px;justify-content:center;align-items:stretch;margin-bottom:10px;}
.sb-player{flex:1;background:var(--card);border:3px solid var(--border);border-radius:14px;padding:8px 6px;text-align:center;box-shadow:0 3px 10px var(--shadow);transition:all .2s;position:relative;max-width:160px;}
.sb-player.lead{border-color:var(--gold);box-shadow:0 0 14px rgba(255,210,63,.5);}
.sb-player.turn-now{transform:translateY(-3px) scale(1.03);border-color:var(--accent);}
.sb-name{font-weight:900;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-score{font-family:'Baloo 2',cursive;font-size:1.6rem;line-height:1;color:var(--accent);}
.sb-crown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:1.1rem;}
.round-pill{text-align:center;font-weight:800;font-size:.7rem;color:var(--text);opacity:.7;margin-bottom:6px;}
.banner{text-align:center;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;padding:8px;border-radius:14px;margin-bottom:10px;background:var(--card);border:2px dashed var(--border);min-height:42px;display:flex;align-items:center;justify-content:center;gap:6px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:430px){.grid{gap:7px;}}
.pcard{position:relative;aspect-ratio:3/4;border-radius:16px;cursor:pointer;transition:transform .15s;}
.pcard:active{transform:scale(.96);}
.pcard.dim{opacity:.55;}
.pcard.win-glow{animation:winPulse 1s ease infinite alternate;}
@keyframes winPulse{from{filter:drop-shadow(0 0 4px var(--gold));}to{filter:drop-shadow(0 0 16px var(--gold));}}
.pcanvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;}
.wrapper{position:absolute;inset:0;border-radius:16px;overflow:hidden;z-index:3;pointer-events:none;}
.wh{position:absolute;top:0;bottom:0;width:52%;transition:transform .7s cubic-bezier(.6,-0.2,.4,1),opacity .6s;background-size:200% 200%;}
.wh.l{left:0;clip-path:polygon(0 0,100% 0,86% 9%,100% 18%,84% 27%,100% 36%,86% 45%,100% 54%,84% 63%,100% 72%,86% 81%,100% 90%,88% 100%,0 100%);}
.wh.r{right:0;clip-path:polygon(14% 0,100% 0,100% 100%,12% 100%,16% 90%,0 81%,14% 72%,0 63%,16% 54%,0 45%,14% 36%,0 27%,16% 18%,0 9%);}
.pcard.ripped .wh.l{transform:translateX(-135%) rotate(-22deg);opacity:0;}
.pcard.ripped .wh.r{transform:translateX(135%) rotate(22deg);opacity:0;}
.wface{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:opacity .4s;pointer-events:none;}
.pcard.ripped .wface{opacity:0;}
.wface .q{font-family:'Baloo 2',cursive;font-size:1.8rem;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.25);}
.wface .lbl{font-size:.5rem;font-weight:900;color:#fff;background:rgba(0,0,0,.18);padding:1px 6px;border-radius:8px;letter-spacing:.5px;}
.ptag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:5;font-size:.55rem;font-weight:900;color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;}
.ptag.show{opacity:1;}
.sbadge{position:absolute;bottom:6px;left:50%;transform:translateX(-50%) scale(0);z-index:5;font-family:'Baloo 2',cursive;font-weight:800;font-size:.72rem;color:#fff;padding:2px 9px;border-radius:12px;white-space:nowrap;transition:transform .3s cubic-bezier(.3,1.6,.5,1);box-shadow:0 2px 6px rgba(0,0,0,.25);}
.sbadge.show{transform:translateX(-50%) scale(1);}
.reveal-btn{display:block;width:100%;margin-top:12px;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--gold),#ffb700);color:#7a4d00;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #d99a00;transition:all .12s;}
.reveal-btn:active{transform:translateY(5px);box-shadow:0 0 0 #d99a00;}
.commentary{text-align:center;font-weight:800;font-size:.85rem;margin-top:10px;min-height:1.4em;color:var(--text);}
.next-btn{display:block;width:100%;margin-top:8px;padding:12px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--accent2);transition:all .12s;}
.next-btn:active{transform:translateY(4px);box-shadow:0 0 0 var(--accent2);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.on{display:flex;}
.modal{background:var(--card);border:4px solid var(--accent);border-radius:22px;padding:22px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.modal h2{font-family:'Baloo 2',cursive;font-size:1.5rem;color:var(--accent);margin-bottom:8px;}
.modal p{font-size:.8rem;font-weight:700;line-height:1.6;margin-bottom:10px;}
.modal button{padding:10px 18px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-family:'Baloo 2',cursive;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 4px 0 var(--accent2);margin:4px;}
.modal button:active{transform:translateY(4px);box-shadow:0 0 0 var(--accent2);}
.eb{position:fixed;pointer-events:none;z-index:9999;font-size:30px;animation:ebFly .95s ease-out forwards;}
@keyframes ebFly{0%{transform:translate(-50%,-50%) scale(.4) rotate(0);opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.4) rotate(var(--r));opacity:0;}}
.confetti{position:fixed;width:9px;height:16px;z-index:9998;pointer-events:none;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-10vh) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.shake{animation:shk .5s;}
@keyframes shk{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px) rotate(-2deg);}40%,80%{transform:translateX(6px) rotate(2deg);}}
</style>
</head>
<body>
<div class="top-bar">
    <a href="index.html" style="text-decoration:none;font-size:1.2rem;">🏠</a>
    <h1>🍦 Pop Off!</h1>
    <div><button class="tb" onclick="toggleDark()">🌙</button> <button class="tb" onclick="showRules()">📖</button></div>
</div>
<div class="wrap">
    <div class="start" id="start">
        <h2>Pop Off! 🍦</h2>
        <div class="pop-row" id="demo-row"></div>
        <p>Six character pops in wrappers — some <b>held their shape</b>, others <b>melted into a droopy face-smeared mess</b>! 🫠<br>Pick one each, rip the wrappers, and whoever's pop is <b>least melted</b> wins!</p>
        <div class="setup">
            <label>🎮 Player 1</label>
            <input id="n1" value="Pika ⚡" maxlength="14">
            <label>🎮 Player 2</label>
            <div class="row"><input id="n2" value="Crow 🐦‍⬛" maxlength="14">
            <select id="t2"><option value="human">👤 Human</option><option value="bot" selected>🤖 Bot</option></select></div>
            <label>🏆 Play to</label>
            <div class="toggle-grp">
                <button class="tgl" data-pts="3" onclick="setPts(3,this)">3 pts</button>
                <button class="tgl on" data-pts="5" onclick="setPts(5,this)">5 pts</button>
                <button class="tgl" data-pts="7" onclick="setPts(7,this)">7 pts</button>
            </div>
            <button class="go-btn" onclick="startGame()">Let's Pop! 🍦</button>
        </div>
    </div>
    <div id="game" style="display:none;">
        <div class="round-pill" id="round-pill">Round 1</div>
        <div class="score-bar" id="score-bar"></div>
        <div class="banner" id="banner">Pick a pop!</div>
        <div class="grid" id="grid"></div>
        <button class="reveal-btn" id="reveal-btn" style="display:none;" onclick="doReveal()">🎬 Rip & Reveal!</button>
        <div class="commentary" id="commentary"></div>
        <button class="next-btn" id="next-btn" style="display:none;" onclick="nextRound()">Next Round →</button>
    </div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
// ===== DATA =====
var PALETTES=[
 {n:'Sunny',body:'#ffd21f',mid:'#fff3da',base:'#ff3b3b',eye:'#16162a'},
 {n:'Grape',body:'#9b4dff',mid:'#efe3ff',base:'#ff5db4',eye:'#16162a'},
 {n:'Aqua',body:'#2ec5e0',mid:'#e3fbff',base:'#3b6bff',eye:'#16162a'},
 {n:'Minty',body:'#54d873',mid:'#e9ffe2',base:'#ffd21f',eye:'#16162a'},
 {n:'Coral',body:'#ff9e3b',mid:'#fff0df',base:'#ff3b6b',eye:'#16162a'},
 {n:'Bubblegum',body:'#ff6ec7',mid:'#ffe3f5',base:'#54d8ff',eye:'#16162a'},
 {n:'Lagoon',body:'#1fd6b5',mid:'#e2fff9',base:'#ff8a3b',eye:'#16162a'},
 {n:'Cherry',body:'#ff4d6d',mid:'#ffe0e6',base:'#7b2cff',eye:'#16162a'}
];
var WRAP_COLORS=[['#ff6ec7','#ff9ad6'],['#5ec5ff','#9ad9ff'],['#7cf0a0','#aef5c0'],['#ffd23f','#ffe585'],['#c084ff','#d6b3ff'],['#ff8a5c','#ffb38f']];
var SILS=['square','tall','round'];
var pts=5, players=[], round=1, pops=[], phase='pick', picker=0, popCv=[], startPicker=0;

function setPts(n,el){pts=n;document.querySelectorAll('.tgl').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function startGame(){
    var n1=document.getElementById('n1').value||'Player 1';
    var n2=document.getElementById('n2').value||'Player 2';
    var bot=document.getElementById('t2').value==='bot';
    players=[{name:n1,bot:false,score:0},{name:n2,bot:bot,score:0}];
    round=1;startPicker=0;
    document.getElementById('start').style.display='none';
    document.getElementById('game').style.display='';
    newRound();
}
function newRound(){
    var sil=SILS[~~(Math.random()*SILS.length)];
    var pals=PALETTES.slice().sort(()=>Math.random()-0.5);
    var base=[0.04,0.18,0.34,0.5,0.66,0.85];
    var melts=base.map(m=>Math.max(0,Math.min(0.92,m+(Math.random()-0.5)*0.14)));
    melts.sort(()=>Math.random()-0.5);
    pops=[];
    for(var i=0;i<6;i++){
        var m=melts[i];
        var drips=[];for(var d=0;d<5;d++)drips.push({x:(Math.random()*2-1),w:0.6+Math.random()*0.7,lf:0.6+Math.random()*0.8});
        var frost=[];for(var f=0;f<14;f++)frost.push({x:Math.random(),y:Math.random()});
        pops.push({pal:pals[i%pals.length],shape:sil,melt:m,integrity:Math.round((1-m)*100),drips:drips,frost:frost,seed:Math.random()*1000,wrap:WRAP_COLORS[i%WRAP_COLORS.length],picked:null,revealed:false});
    }
    picker=startPicker;phase='pick';
    document.getElementById('round-pill').innerText='Round '+round+'  •  first to '+pts;
    document.getElementById('reveal-btn').style.display='none';
    document.getElementById('next-btn').style.display='none';
    document.getElementById('commentary').innerText='';
    renderScore();renderCards();updateBanner();
    if(players[picker].bot)setTimeout(botPick,900);
}
function renderScore(){var sb=document.getElementById('score-bar');var lead=players[0].score===players[1].score?-1:(players[0].score>players[1].score?0:1);sb.innerHTML=players.map((p,i)=>'<div class="sb-player'+(lead===i?' lead':'')+(phase==='pick'&&picker===i?' turn-now':'')+'">'+(lead===i?'<div class="sb-crown">👑</div>':'')+'<div class="sb-name">'+p.name+(p.bot?' 🤖':'')+'</div><div class="sb-score">'+p.score+'</div></div>').join('');}
function renderCards(){
    var g=document.getElementById('grid');g.innerHTML='';popCv=[];
    pops.forEach((p,i)=>{var c=document.createElement('div');c.className='pcard';c.id='pc-'+i;c.onclick=()=>cardClick(i);var grad='linear-gradient(135deg,'+p.wrap[0]+','+p.wrap[1]+')';c.innerHTML='<canvas class="pcanvas" id="cv-'+i+'"></canvas><div class="ptag" id="tag-'+i+'"></div><div class="sbadge" id="bdg-'+i+'"></div><div class="wrapper"><div class="wh l" style="background-image:'+grad+';"></div><div class="wh r" style="background-image:'+grad+';"></div></div><div class="wface"><div class="q">?</div><div class="lbl">POP '+(i+1)+'</div></div>';g.appendChild(c);});
    requestAnimationFrame(()=>{pops.forEach((p,i)=>{var cv=document.getElementById('cv-'+i);var r=cv.getBoundingClientRect();var dpr=window.devicePixelRatio||1;cv.width=Math.round(r.width*dpr);cv.height=Math.round(r.height*dpr);var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);popCv[i]={ctx:ctx,W:r.width,H:r.height};});});
}
function updateBanner(){var b=document.getElementById('banner');if(phase==='pick'){var p=players[picker];if(p.bot)b.innerHTML='🤖 '+p.name+' is choosing...';else b.innerHTML='<span style="color:var(--accent);">'+p.name+'</span> — tap a pop to claim it! 👆';}else if(phase==='ready')b.innerHTML='Both picked! Time to rip! 🎬';else if(phase==='reveal')b.innerHTML='Revealing... 🥁';else if(phase==='over')b.innerHTML='Round '+round+' done!';renderScore();}
function cardClick(i){if(phase!=='pick'||players[picker].bot||pops[i].picked!==null)return;assignPick(i);}
function assignPick(i){pops[i].picked=picker;var tag=document.getElementById('tag-'+i);tag.innerText=players[picker].name;tag.style.background=picker===0?'#ff5d8f':'#5e72e4';tag.classList.add('show');document.getElementById('pc-'+i).classList.add('shake');setTimeout(()=>document.getElementById('pc-'+i).classList.remove('shake'),500);blip(picker===0?520:430,0.08);var done=pops.filter(p=>p.picked!==null).length;if(done>=2){phase='ready';document.getElementById('reveal-btn').style.display='block';updateBanner();}else{picker=1-picker;updateBanner();if(players[picker].bot)setTimeout(botPick,900);}}
function botPick(){if(phase!=='pick')return;var avail=[];pops.forEach((p,i)=>{if(p.picked===null)avail.push(i);});var fl=0;var fi=setInterval(()=>{var r=avail[~~(Math.random()*avail.length)];var el=document.getElementById('pc-'+r);el.style.outline='3px solid var(--gold)';setTimeout(()=>{el.style.outline='';},120);fl++;if(fl>=5){clearInterval(fi);assignPick(avail[~~(Math.random()*avail.length)]);}},150);}
function doReveal(){phase='reveal';document.getElementById('reveal-btn').style.display='none';updateBanner();var picked=[];pops.forEach((p,i)=>{if(p.picked!==null)picked.push(i);});picked.forEach(i=>{pops[i].revealed=true;document.getElementById('pc-'+i).classList.add('ripped');});ripSound();setTimeout(()=>{picked.forEach(i=>showBadge(i));blip(660,0.1);setTimeout(()=>judge(picked),700);},800);}
function showBadge(i){var b=document.getElementById('bdg-'+i);var p=pops[i];var t=tier(p.integrity);b.innerText=p.integrity+'% '+t.emoji;b.style.background=p.integrity>=70?'#2d9e2d':p.integrity>=45?'#ff9e1f':'#e03131';b.classList.add('show');}
function tier(s){if(s>=88)return{label:'FLAWLESS POP!',emoji:'🏆',burst:['🏆','😍','✨','💯','⭐']};if(s>=70)return{label:'Pretty cool!',emoji:'😎',burst:['😎','👍','❄️','✨']};if(s>=48)return{label:'It holds... barely',emoji:'🤏',burst:['🤏','😅','💦']};if(s>=28)return{label:'Getting melty!',emoji:'😬',burst:['😬','💧','😆']};return{label:'TOTAL MELTY MESS!',emoji:'🫠',burst:['🫠','😂','🤣','💧','😹']};}
function judge(picked){var a=picked[0],b=picked[1],pa=pops[a],pb=pops[b];var com=document.getElementById('commentary');var winner=-1;if(pa.integrity>pb.integrity)winner=pa.picked;else if(pb.integrity>pa.integrity)winner=pb.picked;pops.forEach((p,i)=>{if(p.picked===null){p.revealed=true;document.getElementById('pc-'+i).classList.add('ripped','dim');setTimeout(()=>showBadge(i),200);}});if(winner===-1){com.innerHTML='😹 It\'s a <b>melty tie!</b> Both pops equally '+(pa.integrity<50?'tragic':'cool')+'! No point.';burstScreen(['😹','🤝','🍦'],18);finishRound();return;}players[winner].score++;var winCard=pa.picked===winner?a:b,loseCard=winCard===a?b:a;document.getElementById('pc-'+winCard).classList.add('win-glow');var wt=tier(pops[winCard].integrity),lt=tier(pops[loseCard].integrity);var wName=players[winner].name,lName=players[1-winner].name;com.innerHTML='🎉 <b style="color:var(--accent);">'+wName+'</b> wins! '+wt.label+' ('+pops[winCard].integrity+'%) beats '+lName+'\'s '+lt.emoji+' '+pops[loseCard].integrity+'%';burstAt(document.getElementById('pc-'+winCard),wt.burst,16);confetti();blip(784,0.12);setTimeout(()=>blip(988,0.16),120);if(pops[loseCard].integrity<55){var lc=document.getElementById('pc-'+loseCard);setTimeout(()=>burstAt(lc,['😂','🤣','😹','💧'],14),350);lc.classList.add('shake');}finishRound();}
function finishRound(){phase='over';renderScore();updateBanner();if(players[0].score>=pts||players[1].score>=pts)setTimeout(winGame,900);else document.getElementById('next-btn').style.display='block';}
function nextRound(){round++;startPicker=1-startPicker;newRound();}
function winGame(){var w=players[0].score>players[1].score?0:1;var m=document.getElementById('modal');m.innerHTML='<h2>🏆 '+players[w].name+' Wins!</h2><p>Final score:<br><b>'+players[0].name+' '+players[0].score+'</b> — <b>'+players[1].name+' '+players[1].score+'</b><br><br>The coolest, least-melty champion! 🍦👑</p><button onclick="closeModal();location.reload();">🔄 Play Again</button>';document.getElementById('overlay').classList.add('on');for(var k=0;k<3;k++)setTimeout(confetti,k*400);burstScreen(['🏆','🎉','🍦','😍','✨','💛'],26);}

// ============================================================
// FUNNY CARTOON POP ART — wild distortion + reacting faces
// ============================================================
function sr(s){var x=Math.sin(s*127.1+s*0.013)*43758.5453;return x-Math.floor(x);}
function expr(m){if(m<0.15)return'smug';if(m<0.32)return'happy';if(m<0.5)return'nervous';if(m<0.68)return'worried';if(m<0.85)return'panic';return'dead';}

function drawPop(ctx,W,H,p,t){
    ctx.clearRect(0,0,W,H);
    var cx=W/2,pal=p.pal,melt=p.melt;
    var hw=W*0.30,top=H*0.13,bot=H*0.58,h=bot-top;
    var stickTop=H*0.52,stickBot=H*0.97,stickHW=W*0.05;
    var e=expr(melt);
    // ===== DRAMATIC slumping-melt distortion (stable per pop) =====
    var side=(sr(p.seed+9)>0.5)?1:-1;
    var flop=side*melt*1.8*hw*(0.6+sr(p.seed)*0.7);   // top flops HARD to one side
    var droop=melt*h*0.55;                            // and sinks way down
    var topW=hw*(1-melt*0.45);                         // top narrows
    var footW=hw*(1+melt*0.85);                        // bottom oozes out wide
    var footDrop=melt*h*0.40;                          // bottom sags
    var sagL=melt*h*(0.1+sr(p.seed+2)*0.5);            // asymmetric shoulder sag
    var sagR=melt*h*(0.1+sr(p.seed+3)*0.5);
    var topY=top+droop;
    var midY=top+h*0.50;
    var shakeX=(e==='panic')?Math.sin(t*0.045+p.seed)*hw*0.07:0;
    // ground shadow
    ctx.fillStyle='rgba(0,0,0,.07)';ctx.beginPath();ctx.ellipse(cx,stickBot-2,W*0.13,H*0.013,0,0,Math.PI*2);ctx.fill();
    // puddle
    if(melt>0.12){var pw=hw*(0.9+melt*1.5),ph=H*0.025*(0.6+melt*2.2),py=bot+H*0.04+melt*H*0.05,shm=Math.sin(t*0.003+p.seed)*0.5+0.5;ctx.fillStyle=hexA(pal.base,0.55);ctx.beginPath();ctx.ellipse(cx,py,pw,ph,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=hexA('#ffffff',0.2*shm);ctx.beginPath();ctx.ellipse(cx-pw*0.25,py-ph*0.25,pw*0.4,ph*0.4,0,0,Math.PI*2);ctx.fill();}
    // stick
    ctx.fillStyle='#e0ad6e';rr(ctx,cx-stickHW,stickTop,stickHW*2,stickBot-stickTop,stickHW);ctx.fill();ctx.lineWidth=Math.max(1.5,W*0.014);ctx.strokeStyle='#a8762f';ctx.stroke();
    // ===== BODY (shaken in panic) =====
    ctx.save();ctx.translate(shakeX,0);
    // drips first (emerge from bottom)
    var nd=Math.round(melt*5);
    for(var i=0;i<nd;i++){var dp=p.drips[i];var dx=cx+(sr(p.seed+i*3)-0.5)*footW*1.4;var dlen=H*0.04+melt*H*0.22*(0.5+sr(p.seed+i*5));var dw=W*0.09*(0.6+sr(p.seed+i*7));drawDrip(ctx,dx,bot-footDrop-2,dlen,dw,pal.base);}
    // shadow
    ctx.save();bodyPath(ctx,cx,top,bot,h,flop,topW,footW,topY,sagL,sagR,midY,footDrop,melt,t,p.seed);ctx.fillStyle='rgba(0,0,0,.14)';ctx.translate(3,4);ctx.fill();ctx.restore();
    // fill (clipped)
    bodyPath(ctx,cx,top,bot,h,flop,topW,footW,topY,sagL,sagR,midY,footDrop,melt,t,p.seed);
    ctx.save();ctx.clip();
        fillBands(ctx,topY,bot+footDrop,cx-footW-20,cx+footW+20,pal,melt);
        bleed(ctx,cx,topY,bot,hw,pal,melt,p.seed);
        drawFrost(ctx,cx-footW,topY,cx+footW,bot,p.frost,melt);
        ctx.fillStyle='rgba(255,255,255,'+(0.16+melt*0.14)+')';ctx.beginPath();ctx.ellipse(cx+flop*0.5-topW*0.3,topY+h*0.18,topW*0.45,h*0.16,-0.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // bold cartoon outline
    bodyPath(ctx,cx,top,bot,h,flop,topW,footW,topY,sagL,sagR,midY,footDrop,melt,t,p.seed);ctx.lineWidth=Math.max(2.5,W*0.026);ctx.strokeStyle='#2a2230';ctx.lineJoin='round';ctx.stroke();
    // ===== FACE (anchored on the slumped blob) =====
    var fcx=cx+flop*0.42*(1-melt*0.5), fcy=topY+droop*0.32+h*0.10;
    drawFace(ctx,fcx,fcy,hw,h,melt,pal,t,p.seed,e);
    ctx.restore();
    // ghost (soul leaving) when dead
    if(e==='dead'){var gx=cx+hw*0.75,gy=top+h*0.02+Math.sin(t*0.004+p.seed)*5;ghost(ctx,gx,gy,hw*0.34,0.8);}
}

function bodyPath(ctx,cx,top,bot,h,flop,topW,footW,topY,sagL,sagR,midY,footDrop,melt,t,seed){
    var hw=topW/(1-melt*0.45);
    var tipX=cx+flop, tipY=topY;
    ctx.beginPath();
    ctx.moveTo(cx-footW*0.95, midY+sagL+h*0.05);
    // left side up to slumped top tip
    ctx.bezierCurveTo(cx-hw*0.9, topY+sagL, tipX-topW*1.1, tipY-h*0.05, tipX-topW*0.5, tipY);
    // over the melted top
    ctx.bezierCurveTo(tipX+topW*0.2, tipY-h*0.04*(1-melt), tipX+topW*1.0, tipY+h*0.06, cx+hw*0.95, midY+sagR-h*0.02);
    // right side oozing to wide foot
    ctx.bezierCurveTo(cx+hw*1.0, midY+sagR+h*0.2, cx+footW, bot-footDrop-h*0.05, cx+footW, bot-footDrop+sagR*0.5);
    // saggy goopy bottom
    ctx.bezierCurveTo(cx+footW*0.45, bot+footDrop, cx-footW*0.45, bot+footDrop, cx-footW, bot-footDrop+sagL*0.5);
    // left side back up
    ctx.bezierCurveTo(cx-footW, bot-footDrop-h*0.05, cx-footW*0.98, midY+sagL+h*0.2, cx-footW*0.95, midY+sagL+h*0.05);
    ctx.closePath();
}
function fillBands(ctx,top,bot,l,rt,pal,melt){var g=ctx.createLinearGradient(0,top,0,bot);var b1=0.5,b2=0.73,bl=0.02+melt*0.18;g.addColorStop(0,pal.body);g.addColorStop(clamp01(b1-bl),pal.body);g.addColorStop(clamp01(b1+bl),pal.mid);g.addColorStop(clamp01(b2-bl),pal.mid);g.addColorStop(clamp01(b2+bl),pal.base);g.addColorStop(1,pal.base);ctx.fillStyle=g;ctx.fillRect(l-30,top-40,(rt-l)+60,(bot-top)+100);}
function bleed(ctx,cx,top,bot,hw,pal,melt,seed){if(melt<0.22)return;var h=bot-top;softBlob(ctx,cx+(sr(seed+5)-0.5)*hw,top+h*0.72-melt*h*0.18,hw*0.6,pal.base,0.45*melt);softBlob(ctx,cx+(sr(seed+6)-0.5)*hw,top+h*0.5+melt*h*0.1,hw*0.5,pal.body,0.32*melt);softBlob(ctx,cx-(sr(seed+7)-0.5)*hw,top+h*0.76,hw*0.45,pal.mid,0.3*melt);}
function softBlob(ctx,x,y,r,col,a){var g=ctx.createRadialGradient(x,y,1,x,y,r);g.addColorStop(0,hexA(col,a));g.addColorStop(1,hexA(col,0));ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function drawFrost(ctx,l,top,rt,bot,frost,melt){var a=(1-melt)*0.5;if(a<=0.02)return;ctx.fillStyle='rgba(255,255,255,'+a+')';frost.forEach(f=>{var fx=l+f.x*(rt-l);var fy=top+f.y*(bot-top);ctx.beginPath();ctx.arc(fx,fy,(rt-l)*0.015,0,Math.PI*2);ctx.fill();});}

// ===== FACE =====
function drawFace(ctx,fcx,fcy,hw,h,melt,pal,t,seed,e){
    var sep=hw*0.46, er=hw*0.24, ey=fcy;
    if(e==='smug'){
        blush(ctx,fcx-sep*1.15,ey+er*1.1,er*0.7);blush(ctx,fcx+sep*1.15,ey+er*1.1,er*0.7);
        arcEye(ctx,fcx-sep,ey,er*0.85);arcEye(ctx,fcx+sep,ey,er*0.85);
        sparkle(ctx,fcx+sep+er*0.95,ey-er*0.85,er*0.55);
        ctx.lineWidth=Math.max(3,hw*0.07);ctx.strokeStyle='#2a2230';ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(fcx-hw*0.22,fcy+h*0.17);ctx.quadraticCurveTo(fcx+hw*0.04,fcy+h*0.24,fcx+hw*0.3,fcy+h*0.12);ctx.stroke();
    } else if(e==='happy'){
        blush(ctx,fcx-sep*1.15,ey+er*1.1,er*0.7);blush(ctx,fcx+sep*1.15,ey+er*1.1,er*0.7);
        eyeWhite(ctx,fcx-sep,ey,er,er);pupil(ctx,fcx-sep,ey+er*0.12,er*0.5);
        eyeWhite(ctx,fcx+sep,ey,er,er);pupil(ctx,fcx+sep,ey+er*0.12,er*0.5);
        smileMouth(ctx,fcx,fcy+h*0.17,hw*0.52);
    } else if(e==='nervous'){
        eyeWhite(ctx,fcx-sep,ey,er*0.95,er*1.05);pupil(ctx,fcx-sep+er*0.22,ey-er*0.18,er*0.4);
        eyeWhite(ctx,fcx+sep,ey,er*0.95,er*1.05);pupil(ctx,fcx+sep+er*0.22,ey-er*0.18,er*0.4);
        brow(ctx,fcx+sep,ey-er*1.35,er*1.1,-0.35);
        sweat(ctx,fcx+sep+er*1.35,ey-er*0.3,hw*0.13,t,seed);
        wavyMouth(ctx,fcx,fcy+h*0.18,hw*0.34);
    } else if(e==='worried'){
        eyeWhite(ctx,fcx-sep,ey,er*1.1,er*1.25);pupil(ctx,fcx-sep,ey-er*0.32,er*0.36);
        eyeWhite(ctx,fcx+sep,ey,er*1.1,er*1.25);pupil(ctx,fcx+sep,ey-er*0.32,er*0.36);
        brow(ctx,fcx-sep,ey-er*1.5,er*1.05,0.42);brow(ctx,fcx+sep,ey-er*1.5,er*1.05,-0.42);
        sweat(ctx,fcx+sep+er*1.4,ey,hw*0.14,t,seed);
        frownMouth(ctx,fcx,fcy+h*0.2,hw*0.34);
    } else if(e==='panic'){
        var big=er*1.55;
        brow(ctx,fcx-sep,ey-big*1.0,er*0.95,0.5);brow(ctx,fcx+sep,ey-big*1.0,er*0.95,-0.5);
        eyeWhite(ctx,fcx-sep*0.95,ey,big,big*1.12);pupil(ctx,fcx-sep*0.95,ey,big*0.2);
        eyeWhite(ctx,fcx+sep*0.95,ey,big,big*1.12);pupil(ctx,fcx+sep*0.95,ey,big*0.2);
        screamMouth(ctx,fcx,fcy+h*0.24,hw*0.4);
        for(var k=0;k<5;k++){var ph=((t*0.004+k*1.3)%1);var ang=(k/5)*Math.PI*2-Math.PI/2;var d=hw*(0.55+ph*1.0);sweat(ctx,fcx+Math.cos(ang)*d,ey-hw*0.15+Math.sin(ang)*d*0.6,hw*0.12*(1-ph*0.55),0,0);}
    } else { // dead
        xEye(ctx,fcx-sep,ey,er*0.95);xEye(ctx,fcx+sep,ey,er*0.95);
        deadMouth(ctx,fcx,fcy+h*0.2,hw*0.34);
    }
}
function eyeWhite(ctx,x,y,rx,ry){ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.lineWidth=Math.max(2,rx*0.2);ctx.strokeStyle='#2a2230';ctx.stroke();}
function pupil(ctx,x,y,r){ctx.fillStyle='#2a2230';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-r*0.32,y-r*0.32,r*0.36,0,Math.PI*2);ctx.fill();}
function arcEye(ctx,x,y,r){ctx.lineWidth=Math.max(3,r*0.42);ctx.strokeStyle='#2a2230';ctx.lineCap='round';ctx.beginPath();ctx.arc(x,y+r*0.3,r,Math.PI*1.15,Math.PI*1.85);ctx.stroke();}
function xEye(ctx,x,y,r){ctx.lineWidth=Math.max(3,r*0.42);ctx.strokeStyle='#2a2230';ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x-r,y-r);ctx.lineTo(x+r,y+r);ctx.moveTo(x+r,y-r);ctx.lineTo(x-r,y+r);ctx.stroke();}
function brow(ctx,x,y,len,ang){ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.lineWidth=Math.max(3,len*0.26);ctx.strokeStyle='#2a2230';ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-len/2,0);ctx.lineTo(len/2,0);ctx.stroke();ctx.restore();}
function blush(ctx,x,y,r){ctx.fillStyle='rgba(255,110,150,.5)';ctx.beginPath();ctx.ellipse(x,y,r,r*0.62,0,0,Math.PI*2);ctx.fill();}
function sparkle(ctx,x,y,s){ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(x,y-s);ctx.quadraticCurveTo(x+s*0.18,y-s*0.18,x+s,y);ctx.quadraticCurveTo(x+s*0.18,y+s*0.18,x,y+s);ctx.quadraticCurveTo(x-s*0.18,y+s*0.18,x-s,y);ctx.quadraticCurveTo(x-s*0.18,y-s*0.18,x,y-s);ctx.fill();}
function sweat(ctx,x,y,s){ctx.fillStyle='rgba(110,200,255,.92)';ctx.beginPath();ctx.moveTo(x,y-s);ctx.quadraticCurveTo(x+s*0.78,y+s*0.35,x,y+s);ctx.quadraticCurveTo(x-s*0.78,y+s*0.35,x,y-s);ctx.fill();ctx.fillStyle='rgba(255,255,255,.65)';ctx.beginPath();ctx.arc(x-s*0.22,y,s*0.2,0,Math.PI*2);ctx.fill();}
function smileMouth(ctx,x,y,w){ctx.fillStyle='#7a1228';ctx.beginPath();ctx.moveTo(x-w/2,y);ctx.quadraticCurveTo(x,y+w*0.72,x+w/2,y);ctx.quadraticCurveTo(x,y+w*0.16,x-w/2,y);ctx.closePath();ctx.fill();ctx.fillStyle='#ff5d7a';ctx.beginPath();ctx.ellipse(x,y+w*0.34,w*0.32,w*0.18,0,0,Math.PI*2);ctx.fill();ctx.lineWidth=Math.max(2.5,w*0.09);ctx.strokeStyle='#2a2230';ctx.beginPath();ctx.moveTo(x-w/2,y);ctx.quadraticCurveTo(x,y+w*0.72,x+w/2,y);ctx.quadraticCurveTo(x,y+w*0.16,x-w/2,y);ctx.stroke();}
function wavyMouth(ctx,x,y,w){ctx.lineWidth=Math.max(3,w*0.13);ctx.strokeStyle='#2a2230';ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x-w/2,y);ctx.quadraticCurveTo(x-w*0.16,y-w*0.22,x,y);ctx.quadraticCurveTo(x+w*0.16,y+w*0.22,x+w/2,y);ctx.stroke();}
function frownMouth(ctx,x,y,w){ctx.fillStyle='#7a1228';ctx.beginPath();ctx.ellipse(x,y+w*0.18,w*0.4,w*0.34,0,0,Math.PI*2);ctx.fill();ctx.lineWidth=Math.max(2.5,w*0.09);ctx.strokeStyle='#2a2230';ctx.stroke();}
function screamMouth(ctx,x,y,w){ctx.fillStyle='#6a0f1e';ctx.beginPath();ctx.ellipse(x,y+w*0.12,w*0.44,w*0.62,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(x-w*0.32,y-w*0.46,w*0.64,w*0.17);ctx.fillStyle='#ff4d6a';ctx.beginPath();ctx.ellipse(x,y+w*0.52,w*0.3,w*0.24,0,0,Math.PI*2);ctx.fill();ctx.lineWidth=Math.max(2.5,w*0.09);ctx.strokeStyle='#2a2230';ctx.beginPath();ctx.ellipse(x,y+w*0.12,w*0.44,w*0.62,0,0,Math.PI*2);ctx.stroke();}
function deadMouth(ctx,x,y,w){ctx.fillStyle='#6a0f1e';ctx.beginPath();ctx.ellipse(x-w*0.08,y,w*0.3,w*0.24,0,0,Math.PI*2);ctx.fill();ctx.lineWidth=Math.max(2.5,w*0.09);ctx.strokeStyle='#2a2230';ctx.stroke();ctx.fillStyle='#ff4d6a';ctx.beginPath();ctx.moveTo(x-w*0.28,y+w*0.05);ctx.quadraticCurveTo(x-w*0.55,y+w*0.55,x-w*0.2,y+w*0.75);ctx.quadraticCurveTo(x+w*0.02,y+w*0.45,x+w*0.02,y+w*0.05);ctx.closePath();ctx.fill();ctx.lineWidth=Math.max(2,w*0.07);ctx.strokeStyle='#2a2230';ctx.stroke();}
function ghost(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#f0f4ff';ctx.beginPath();ctx.arc(x,y,s,Math.PI,0);ctx.lineTo(x+s,y+s*0.9);ctx.quadraticCurveTo(x+s*0.66,y+s*0.6,x+s*0.33,y+s*0.9);ctx.quadraticCurveTo(x,y+s*0.6,x-s*0.33,y+s*0.9);ctx.quadraticCurveTo(x-s*0.66,y+s*0.6,x-s,y+s*0.9);ctx.closePath();ctx.fill();ctx.fillStyle='#556';ctx.beginPath();ctx.arc(x-s*0.32,y-s*0.05,s*0.13,0,Math.PI*2);ctx.arc(x+s*0.32,y-s*0.05,s*0.13,0,Math.PI*2);ctx.fill();ctx.restore();}

function rr(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawDrip(ctx,x,topY,len,w,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x-w*0.32,topY);ctx.lineTo(x-w*0.28,topY+len-w*0.45);ctx.lineTo(x+w*0.28,topY+len-w*0.45);ctx.lineTo(x+w*0.32,topY);ctx.closePath();ctx.fill();ctx.beginPath();ctx.arc(x,topY+len-w*0.45,w*0.55,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(x-w*0.18,topY+len-w*0.55,w*0.18,0,Math.PI*2);ctx.fill();}
function hexA(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
function shade(hex,amt){var r=clamp255(parseInt(hex.slice(1,3),16)+amt),g=clamp255(parseInt(hex.slice(3,5),16)+amt),b=clamp255(parseInt(hex.slice(5,7),16)+amt);return'rgb('+r+','+g+','+b+')';}
function clamp255(v){return Math.max(0,Math.min(255,v));}
function clamp01(v){return Math.max(0,Math.min(1,v));}

function loop(ts){pops.forEach((p,i)=>{if(p.revealed&&popCv[i])drawPop(popCv[i].ctx,popCv[i].W,popCv[i].H,p,ts);});requestAnimationFrame(loop);}
requestAnimationFrame(loop);

var demoCanvases=[];
function buildDemo(){var row=document.getElementById('demo-row');row.innerHTML='';var dm=[0.06,0.78,0.95];for(var i=0;i<3;i++){var cv=document.createElement('canvas');row.appendChild(cv);var dpr=window.devicePixelRatio||1;cv.width=64*dpr;cv.height=88*dpr;var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);var dp={pal:PALETTES[i*2],melt:dm[i],integrity:0,drips:[{x:0.3,w:0.8,lf:0.9},{x:-0.4,w:0.7,lf:0.7},{x:0.6,w:0.6,lf:0.8},{x:-0.2,w:0.9,lf:1},{x:0.1,w:0.7,lf:0.6}],frost:[],seed:i*137+11};for(var f=0;f<14;f++)dp.frost.push({x:Math.random(),y:Math.random()});demoCanvases.push({ctx:ctx,W:64,H:88,p:dp});}}
function demoLoop(ts){if(document.getElementById('start').style.display!=='none')demoCanvases.forEach(d=>drawPop(d.ctx,d.W,d.H,d.p,ts));requestAnimationFrame(demoLoop);}

function burstAt(el,emojis,n){var r=el.getBoundingClientRect();var x=r.left+r.width/2,y=r.top+r.height/2;for(var i=0;i<n;i++){var s=document.createElement('div');s.className='eb';s.innerText=emojis[~~(Math.random()*emojis.length)];s.style.left=x+'px';s.style.top=y+'px';var ang=Math.random()*Math.PI*2,dist=60+Math.random()*120;s.style.setProperty('--dx',Math.cos(ang)*dist+'px');s.style.setProperty('--dy',Math.sin(ang)*dist+'px');s.style.setProperty('--r',(Math.random()*720-360)+'deg');s.style.fontSize=(20+Math.random()*18)+'px';document.body.appendChild(s);setTimeout(()=>s.remove(),1000);}}
function burstScreen(emojis,n){burstAt({getBoundingClientRect:()=>({left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0})},emojis,n);}
function confetti(){var cols=['#ff5d8f','#ffd23f','#5ec5ff','#7cf0a0','#c084ff','#ff8a5c'];for(var i=0;i<40;i++){var c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=cols[~~(Math.random()*cols.length)];c.style.animationDuration=(Math.random()*1.5+1.8)+'s';c.style.animationDelay=(Math.random()*0.3)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),3800);}}
function blip(freq,dur,type){try{var a=new(window.AudioContext||window.webkitAudioContext)();var o=a.createOscillator(),g=a.createGain();o.type=type||'triangle';o.frequency.setValueAtTime(freq,a.currentTime);g.gain.setValueAtTime(0.08,a.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(dur||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(dur||0.15));}catch(e){}}
function ripSound(){try{var a=new(window.AudioContext||window.webkitAudioContext)();var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(300,a.currentTime);o.frequency.exponentialRampToValueAtTime(80,a.currentTime+0.25);g.gain.setValueAtTime(0.06,a.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.28);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.28);}catch(e){}}

function closeModal(){document.getElementById('overlay').classList.remove('on');}
function toggleDark(){document.body.classList.toggle('dark');}
