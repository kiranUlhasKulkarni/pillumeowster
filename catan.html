<!-- <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Pika-tan — Catan</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#faf3eb;--card:#fff;--text:#4a3520;--accent:#d4883a;--accent2:#c05030;--gold:#d4a020;--border:#e0d0c0;--shadow:rgba(180,150,100,.15);}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
body.dark{--bg:#1a1410;--card:#2a2018;--text:#d8c8a8;--border:#3a3020;--shadow:rgba(0,0,0,.3);}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;}
.top-bar h1{font-family:'Baloo 2',cursive;font-size:1rem;color:var(--accent);}
.tb{padding:4px 10px;border-radius:8px;border:2px solid var(--border);background:var(--card);font-family:inherit;font-weight:800;font-size:.65rem;cursor:pointer;color:var(--text);}
.game-wrap{display:flex;flex-direction:column;align-items:center;padding:8px;}
.board-area{position:relative;width:min(95vw,420px);aspect-ratio:1/1;margin:0 auto;}
#board-cvs{width:100%;height:100%;border-radius:12px;border:3px solid var(--border);background:var(--card);box-shadow:0 4px 16px var(--shadow);}
.panel{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px;margin:6px 0;width:min(95vw,420px);box-shadow:0 2px 8px var(--shadow);}
.panel-title{font-family:'Baloo 2',cursive;font-size:.8rem;color:var(--accent);margin-bottom:4px;}
.res-bar{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;}
.res-item{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:6px;font-size:.6rem;font-weight:800;border:2px solid var(--border);background:var(--card);}
.res-item .ri{font-size:.8rem;}
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:4px;}
.act-btn{padding:7px 4px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-family:inherit;font-weight:800;font-size:.58rem;cursor:pointer;transition:all .15s;color:var(--text);text-align:center;}
.act-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(212,136,58,.08);}
.act-btn:active:not(:disabled){transform:scale(.95);}
.act-btn:disabled{opacity:.35;cursor:default;}
.act-btn .ae{display:block;font-size:1rem;margin-bottom:1px;}
.log-box{background:rgba(0,0,0,.03);border-radius:8px;padding:6px 8px;max-height:90px;overflow-y:auto;font-size:.5rem;line-height:1.6;color:#888;margin-top:4px;}
body.dark .log-box{background:rgba(255,255,255,.03);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--card);border:3px solid var(--accent);border-radius:16px;padding:16px;max-width:360px;width:92%;text-align:center;max-height:85vh;overflow-y:auto;}
.modal h2{font-family:'Baloo 2',cursive;font-size:1rem;color:var(--accent);margin-bottom:6px;}
.modal p{font-size:.65rem;font-weight:700;color:#888;margin-bottom:6px;}
.modal button{padding:7px 14px;border-radius:10px;border:2px solid var(--accent);background:var(--accent);color:#fff;font-family:inherit;font-weight:800;font-size:.65rem;cursor:pointer;margin:3px;}
.modal button.sec{background:transparent;color:var(--accent);}
.trade-row{display:flex;align-items:center;gap:4px;margin:4px 0;justify-content:center;font-weight:800;font-size:.65rem;}
.trade-row select,.trade-row input[type=number]{padding:4px;border-radius:6px;border:2px solid var(--border);font-family:inherit;font-weight:800;font-size:.6rem;background:var(--card);color:var(--text);}
.dice-display{display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0;}
.dice{width:34px;height:34px;background:var(--card);border:2px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:var(--accent);box-shadow:0 2px 6px var(--shadow);}
.dice.rolling{animation:diceRoll .5s ease;}
@keyframes diceRoll{0%{transform:rotate(0)scale(1);}50%{transform:rotate(180deg)scale(1.2);}100%{transform:rotate(360deg)scale(1);}}
.tooltip{position:absolute;background:rgba(0,0,0,.85);color:#fff;padding:4px 8px;border-radius:6px;font-size:.5rem;font-weight:800;pointer-events:none;z-index:50;white-space:nowrap;display:none;}
/* Player panels */
.pp{border-radius:10px;padding:6px 8px;margin:3px 0;border:2px solid var(--border);background:var(--card);transition:all .2s;}
.pp.active-turn{border-color:var(--accent);box-shadow:0 0 8px rgba(212,136,58,.3);background:rgba(212,136,58,.04);}
.pp-head{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.pp-name{font-weight:900;font-size:.65rem;}
.pp-vp{font-weight:900;font-size:.6rem;color:var(--accent);margin-left:auto;}
.pp-badges{display:flex;gap:3px;margin-left:4px;}
.pp-badge{font-size:.5rem;font-weight:800;padding:1px 4px;border-radius:4px;background:rgba(212,160,32,.15);color:var(--gold);border:1px solid rgba(212,160,32,.3);}
.pp-res{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;}
.pp-ri{font-size:.5rem;font-weight:800;padding:1px 4px;border-radius:4px;border:1px solid var(--border);background:var(--card);}
.dev-cards{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0;}
.dev-card{padding:3px 6px;border-radius:6px;border:2px solid var(--border);background:var(--card);font-size:.5rem;font-weight:800;cursor:pointer;transition:all .15s;}
.dev-card:hover{border-color:var(--gold);transform:translateY(-1px);}
/* Start screen */
.start-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:16px;}
.start-screen h1{font-family:'Baloo 2',cursive;font-size:1.8rem;color:var(--accent);}
.start-screen p{font-size:.7rem;font-weight:700;color:#888;max-width:300px;}
.setup-box{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px;width:min(90vw,340px);text-align:left;}
.setup-box label{font-size:.65rem;font-weight:800;color:#888;display:block;margin:6px 0 2px;}
.setup-box input,.setup-box select{width:100%;padding:6px;border-radius:8px;border:2px solid var(--border);font-family:inherit;font-weight:700;font-size:.7rem;background:var(--card);color:var(--text);}
.setup-row{display:flex;gap:6px;align-items:center;margin:4px 0;}
.setup-row input{flex:1;}
.setup-row select{width:80px;}
.sbtn{display:block;width:100%;padding:12px;border-radius:12px;border:2px solid var(--accent);background:var(--accent);color:#fff;font-family:inherit;font-weight:900;font-size:.8rem;cursor:pointer;margin-top:10px;}
.sbtn:active{transform:scale(.97);}
@media(max-width:400px){.act-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="top-bar">
    <a href="index.html" style="text-decoration:none;font-size:1rem;">🏠</a>
    <h1>🏝️ Pika-tan</h1>
    <div><button class="tb" onclick="toggleDark()">🌙</button> <button class="tb" onclick="showRules()">📖</button></div>
</div>

<!-- START SCREEN -->
<div class="start-screen" id="start-screen">
    <h1>🏝️ Pika-tan</h1>
    <p>Settlers of Catan<br>First to <b>10 Victory Points</b> wins!</p>
    <div class="setup-box">
        <label>Number of Players (2–4)</label>
        <select id="setup-count" onchange="updateSetupSlots()">
            <option value="2" selected>2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
        </select>
        <div id="setup-slots"></div>
        <button class="sbtn" onclick="launchGame()">🏝️ Start Game!</button>
    </div>
    <div style="margin-top:6px;"><button class="tb" onclick="toggleDark()">🌙 Theme</button> <button class="tb" onclick="showRules()">📖 Rules</button></div>
</div>

<!-- GAME -->
<div class="game-wrap" id="game-wrap" style="display:none;">
    <!-- Player panels (generated dynamically) -->
    <div id="player-panels" style="width:min(95vw,420px);"></div>
    <!-- Board -->
    <div class="board-area"><canvas id="board-cvs"></canvas><div class="tooltip" id="tooltip"></div></div>
    <!-- Dice -->
    <div class="dice-display">
        <div class="dice" id="die1">?</div><div class="dice" id="die2">?</div>
        <span style="font-weight:900;font-size:.65rem;color:#888;" id="roll-sum"></span>
    </div>
    <!-- Actions for current human player -->
    <div class="panel"><div class="panel-title" id="act-title">🎮 Actions</div><div class="act-grid" id="act-grid"></div></div>
    <!-- Dev cards hand -->
    <div class="panel" id="dev-panel" style="display:none;"><div class="panel-title">🃏 Your Dev Cards</div><div class="dev-cards" id="dev-cards"></div></div>
    <!-- Log -->
    <div class="panel"><div class="panel-title">📜 Log</div><div class="log-box" id="log-box"></div></div>
</div>
<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal"></div></div>

<script>
var PCOLORS = ['#d4a020','#5080c0','#c05030','#40a060'];
var PCOLORS_DARK = ['#ffd060','#80b0e0','#e07050','#60c080'];
var RES = ['wood','brick','sheep','ore','wheat'];
var RES_E = {wood:'🪵',brick:'🧱',sheep:'🐑',ore:'⛰️',wheat:'🌾',desert:'🏜️'};
var RES_C = {wood:'#2d8a4e',brick:'#c05030',sheep:'#7cba3a',ore:'#8090a0',wheat:'#d4a020',desert:'#d4c090'};
var BUILD_COST = {road:{wood:1,brick:1},settlement:{wood:1,brick:1,sheep:1,wheat:1},city:{ore:3,wheat:2},devcard:{ore:1,sheep:1,wheat:1}};
var DEV_TYPES = ['knight','knight','knight','knight','knight','knight','knight','knight','knight','knight','knight','knight','knight','knight','vp','vp','vp','vp','vp','roadbuild','roadbuild','yearofplenty','yearofplenty','monopoly','monopoly'];
var HEX_LAYOUT = [{q:0,r:0},{q:1,r:0},{q:2,r:0},{q:-1,r:1},{q:0,r:1},{q:1,r:1},{q:2,r:1},{q:-2,r:2},{q:-1,r:2},{q:0,r:2},{q:1,r:2},{q:2,r:2},{q:-2,r:3},{q:-1,r:3},{q:0,r:3},{q:1,r:3},{q:-2,r:4},{q:-1,r:4},{q:0,r:4}];
var NUMBER_TOKENS = [5,2,6,3,8,10,9,12,11,4,8,10,9,4,5,6,3,11];
var TERRAIN_POOL = ['wood','wood','wood','wood','brick','brick','brick','sheep','sheep','sheep','sheep','ore','ore','ore','wheat','wheat','wheat','wheat','desert'];

var G = {phase:'setup1',turn:0,hexes:[],verts:[],edges:[],players:[],devDeck:[],robber:-1,setupPlacements:0,setupOrder:[],dice:[0,0],log:[],buildings:[]};
var cvs,ctx,CW,CH,hexSize;
var pikaImg=new Image(),crowImg=new Image();pikaImg.src='pikachu.png';crowImg.src='crow.png';
var numPlayers=2;

// ===== SETUP SCREEN =====
function updateSetupSlots(){
    var n=+document.getElementById('setup-count').value;
    var div=document.getElementById('setup-slots');
    var defaults=['Pika ⚡','Crow 🐦‍⬛','Fox 🦊','Bear 🐻'];
    var h='';
    for(var i=0;i<n;i++){
        h+='<div class="setup-row"><input id="pname-'+i+'" value="'+defaults[i]+'" placeholder="Player '+(i+1)+' name">';
        h+='<select id="ptype-'+i+'"><option value="human">👤 Human</option><option value="bot"'+(i>=1?' selected':'')+'>🤖 Bot</option></select></div>';
    }
    div.innerHTML=h;
}
updateSetupSlots();

function launchGame(){
    numPlayers=+document.getElementById('setup-count').value;
    G.players=[];
    for(var i=0;i<numPlayers;i++){
        var name=document.getElementById('pname-'+i).value||('Player '+(i+1));
        var isBot=document.getElementById('ptype-'+i).value==='bot';
        G.players.push({name:name,isBot:isBot,color:PCOLORS[i],res:{wood:0,brick:0,sheep:0,ore:0,wheat:0},devCards:[],usedKnights:0,roads:0,settlements:0,cities:0,longestRoad:false,largestArmy:false,vp:0});
    }
    document.getElementById('start-screen').style.display='none';
    document.getElementById('game-wrap').style.display='';
    initGame();
}

// ===== INIT =====
function initGame(){
    var terrains=shuffle(TERRAIN_POOL.slice()),nums=NUMBER_TOKENS.slice(),ni=0;
    G.hexes=[];
    for(var i=0;i<HEX_LAYOUT.length;i++){
        var t=terrains[i],n=0;
        if(t!=='desert'){n=nums[ni];ni++;}else G.robber=i;
        G.hexes.push({q:HEX_LAYOUT[i].q,r:HEX_LAYOUT[i].r,type:t,num:n,idx:i});
    }
    generateGraph();
    G.devDeck=shuffle(DEV_TYPES.slice());
    for(var p=0;p<G.players.length;p++){
        var pl=G.players[p];pl.res={wood:0,brick:0,sheep:0,ore:0,wheat:0};
        pl.devCards=[];pl.usedKnights=0;pl.roads=0;pl.settlements=0;pl.cities=0;pl.longestRoad=false;pl.largestArmy=false;pl.vp=0;
    }
    G.phase='setup1';G.turn=0;G.setupPlacements=0;G.dice=[0,0];G.log=[];G.buildings=[];
    // Setup order: 0,1,...,N-1,N-1,...,1,0 (snake draft)
    G.setupOrder=[];
    for(var i=0;i<numPlayers;i++)G.setupOrder.push(i);
    for(var i=numPlayers-1;i>=0;i--)G.setupOrder.push(i);
    log('🏝️ Setup! '+G.players[G.setupOrder[0]].name+' places first.');
    G.turn=G.setupOrder[0];
    setupCanvas();render();
    if(G.players[G.turn].isBot)setTimeout(botSetup,600);
}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=~~(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

// ===== HEX GEOMETRY =====
function hexCenter(q,r){
    var rowSizes=[3,4,5,4,3],rowIdx=r;
    var firstQ=HEX_LAYOUT.filter(function(h){return h.r===r;})[0].q;
    var colIdx=q-firstQ,rowW=rowSizes[rowIdx];
    var hSpacing=hexSize*1.75,vSpacing=hexSize*1.52;
    var offX=CW/2,offY=(CH-4*vSpacing)/2+hexSize*.1;
    var x=offX+(colIdx-(rowW-1)/2)*hSpacing,y=offY+rowIdx*vSpacing;
    return{x:x,y:y};
}
function hexCorner(cx,cy,i){var a=Math.PI/180*(60*i-30);return{x:cx+hexSize*Math.cos(a),y:cy+hexSize*Math.sin(a)};}

// ===== GRAPH =====
function generateGraph(){
    var vertMap={};G.verts=[];G.edges=[];
    setupCanvasSize();
    function vKey(x,y){return Math.round(x*2)+','+Math.round(y*2);}
    function getVert(x,y,hi){
        var k=vKey(x,y);
        if(vertMap[k]!==undefined){var v=G.verts[vertMap[k]];if(v.hexes.indexOf(hi)<0)v.hexes.push(hi);return vertMap[k];}
        var vi=G.verts.length;G.verts.push({x:x,y:y,hexes:[hi],building:null,player:-1,idx:vi});vertMap[k]=vi;return vi;
    }
    for(var hi=0;hi<G.hexes.length;hi++){
        var h=G.hexes[hi],c=hexCenter(h.q,h.r),corners=[];
        for(var ci=0;ci<6;ci++){var pt=hexCorner(c.x,c.y,ci);corners.push(getVert(pt.x,pt.y,hi));}
        h.corners=corners;
        for(var ci=0;ci<6;ci++){var a=corners[ci],b=corners[(ci+1)%6],ek=Math.min(a,b)+'-'+Math.max(a,b);
            if(!G.edges.some(function(e){return e.key===ek;}))G.edges.push({a:a,b:b,key:ek,player:-1,idx:G.edges.length});}
    }
}
function updateVertexPositions(){setupCanvasSize();for(var hi=0;hi<G.hexes.length;hi++){var h=G.hexes[hi],c=hexCenter(h.q,h.r);for(var ci=0;ci<6;ci++){var pt=hexCorner(c.x,c.y,ci);var vi=h.corners[ci];G.verts[vi].x=pt.x;G.verts[vi].y=pt.y;}}}
function setupCanvasSize(){cvs=document.getElementById('board-cvs');var r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;CW=r.width;CH=r.height;cvs.width=Math.round(CW*dpr);cvs.height=Math.round(CH*dpr);ctx=cvs.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);hexSize=Math.min(CW/10.5,CH/8.5);}
function setupCanvas(){setupCanvasSize();updateVertexPositions();restoreClickHandler();cvs.onmousemove=function(e){var r=cvs.getBoundingClientRect();handleHover(e.clientX-r.left,e.clientY-r.top);};}
function restoreClickHandler(){cvs.onclick=function(e){var r=cvs.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top);};}

// ===== BUILDING REGISTRY =====
function registerBuilding(vi,player,type){
    var v=G.verts[vi];v.building=type;v.player=player;
    var adj=[];
    for(var hi=0;hi<G.hexes.length;hi++){var hex=G.hexes[hi],hc=hexCenter(hex.q,hex.r);
        for(var ci=0;ci<6;ci++){var pt=hexCorner(hc.x,hc.y,ci);if(Math.hypot(pt.x-v.x,pt.y-v.y)<hexSize*.3){adj.push(hi);break;}}}
    var existing=null;for(var bi=0;bi<G.buildings.length;bi++)if(G.buildings[bi].vertIdx===vi){existing=G.buildings[bi];break;}
    if(existing){existing.type=type;existing.player=player;existing.adjacentHexes=adj;}
    else G.buildings.push({vertIdx:vi,player:player,type:type,adjacentHexes:adj});
}
function distributeResources(sum){
    var gave=false;
    for(var bi=0;bi<G.buildings.length;bi++){var b=G.buildings[bi];
        for(var ai=0;ai<b.adjacentHexes.length;ai++){var hi=b.adjacentHexes[ai],hex=G.hexes[hi];
            if(hex.num===sum&&hex.type!=='desert'&&G.robber!==hi){var amt=b.type==='city'?2:1;G.players[b.player].res[hex.type]+=amt;
                log(G.players[b.player].name+' +'+amt+' '+RES_E[hex.type]);gave=true;}}}
    if(!gave)log('No buildings on '+sum+'.');
}

// ===== RENDER =====
function render(){
    if(!ctx)return;var dk=document.body.classList.contains('dark');
    ctx.fillStyle=dk?'#0a1828':'#a0c8e8';ctx.fillRect(0,0,CW,CH);
    ctx.strokeStyle=dk?'rgba(40,80,120,.15)':'rgba(255,255,255,.2)';ctx.lineWidth=1;
    for(var wy=0;wy<CH;wy+=12){ctx.beginPath();for(var wx=0;wx<CW;wx+=4){var yo=Math.sin(wx*.05+wy*.08)*2;if(wx===0)ctx.moveTo(wx,wy+yo);else ctx.lineTo(wx,wy+yo);}ctx.stroke();}
    var ig=ctx.createRadialGradient(CW/2,CH/2,hexSize*1.5,CW/2,CH/2,hexSize*4.2);
    ig.addColorStop(0,dk?'rgba(40,50,30,.6)':'rgba(200,210,160,.5)');ig.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ig;ctx.beginPath();ctx.arc(CW/2,CH/2,hexSize*4.2,0,Math.PI*2);ctx.fill();
    for(var hi=0;hi<G.hexes.length;hi++)drawHex(hi);
    // Roads
    for(var ei=0;ei<G.edges.length;ei++){var e=G.edges[ei];if(e.player>=0){var va=G.verts[e.a],vb=G.verts[e.b];
        ctx.strokeStyle=dk?PCOLORS_DARK[e.player]:G.players[e.player].color;ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(va.x,va.y);ctx.lineTo(vb.x,vb.y);ctx.stroke();
        ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(va.x,va.y);ctx.lineTo(vb.x,vb.y);ctx.stroke();}}
    // Buildings
    for(var vi=0;vi<G.verts.length;vi++){var v=G.verts[vi];if(v.building)drawBuilding(v);}
    if(G.phase==='setup1'||G.phase==='setup2')drawValidPlacements();
    updateUI();
}
function drawHex(hi){
    var h=G.hexes[hi],c=hexCenter(h.q,h.r),dk=document.body.classList.contains('dark');
    ctx.fillStyle=dk?darken(RES_C[h.type],.5):RES_C[h.type];
    ctx.beginPath();for(var i=0;i<6;i++){var pt=hexCorner(c.x,c.y,i);if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);}ctx.closePath();ctx.fill();
    ctx.strokeStyle=dk?'rgba(255,255,255,.1)':'rgba(0,0,0,.15)';ctx.lineWidth=1.5;ctx.stroke();
    if(G.robber===hi){ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.arc(c.x,c.y,hexSize*.25,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='700 '+hexSize*.22+'px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🥷',c.x,c.y);}
    if(h.num>0&&G.robber!==hi){ctx.fillStyle=dk?'#222':'#fff';ctx.beginPath();ctx.arc(c.x,c.y,hexSize*.28,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=h.num===6||h.num===8?'#c03030':'#888';ctx.lineWidth=h.num===6||h.num===8?2:1;ctx.stroke();
        ctx.fillStyle=h.num===6||h.num===8?'#c03030':(dk?'#ddd':'#333');ctx.font='900 '+hexSize*.24+'px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(h.num,c.x,c.y);
        var dots=probDots(h.num);ctx.fillStyle=h.num===6||h.num===8?'#c03030':'#888';for(var di=0;di<dots;di++){ctx.beginPath();ctx.arc(c.x-(dots-1)*2.5+di*5,c.y+hexSize*.16,1.5,0,Math.PI*2);ctx.fill();}}
    if(h.type!=='desert'&&G.robber!==hi){ctx.font=hexSize*.2+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(RES_E[h.type],c.x,c.y-hexSize*.42);}
}
function drawBuilding(v){
    var sz=hexSize*.2,dk=document.body.classList.contains('dark'),col=dk?PCOLORS_DARK[v.player]:G.players[v.player].color;
    if(v.building==='settlement'){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(v.x,v.y-sz*1.2);ctx.lineTo(v.x+sz,v.y-sz*.3);ctx.lineTo(v.x+sz,v.y+sz*.5);ctx.lineTo(v.x-sz,v.y+sz*.5);ctx.lineTo(v.x-sz,v.y-sz*.3);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.stroke();}
    else if(v.building==='city'){var cs=sz*1.4;ctx.fillStyle=col;ctx.fillRect(v.x-cs,v.y-cs*.3,cs*2,cs*1.1);ctx.fillRect(v.x-cs,v.y-cs,cs*.5,cs*.7);ctx.fillRect(v.x+cs*.5,v.y-cs,cs*.5,cs*.7);ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.strokeRect(v.x-cs,v.y-cs*.3,cs*2,cs*1.1);}
}
function drawValidPlacements(){
    if(!G.players[G.turn].isBot){var placed=G.verts.filter(function(v){return v.player===G.turn&&v.building==='settlement';}).length;
        var expected=G.phase==='setup1'?1:2;
        if(placed<expected){for(var vi=0;vi<G.verts.length;vi++){if(canPlaceSetup(vi)){var v=G.verts[vi];ctx.fillStyle='rgba(255,215,0,.3)';ctx.beginPath();ctx.arc(v.x,v.y,hexSize*.15,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(v.x,v.y,hexSize*.15,0,Math.PI*2);ctx.stroke();}}}
    }
}
function darken(hex,f){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgb('+~~(r*f)+','+~~(g*f)+','+~~(b*f)+')';}
function probDots(n){return[0,0,1,2,3,4,5,0,5,4,3,2,1][n]||0;}

// ===== CLICK =====
function handleClick(mx,my){if(G.players[G.turn].isBot)return;if(G.phase==='setup1'||G.phase==='setup2')handleSetupClick(mx,my);else if(G.phase==='robber')handleRobberClick(mx,my);}
function handleSetupClick(mx,my){
    var placed=G.verts.filter(function(v){return v.player===G.turn&&v.building==='settlement';}).length;
    var expected=G.phase==='setup1'?1:2;
    if(placed<expected){var best=findClosestVert(mx,my,hexSize*.3);if(best>=0&&canPlaceSetup(best)){registerBuilding(best,G.turn,'settlement');G.players[G.turn].settlements++;log(G.players[G.turn].name+' placed a settlement.');
        if(G.phase==='setup2'){for(var hi=0;hi<G.hexes.length;hi++){var hex=G.hexes[hi];if(hex.type==='desert')continue;var hc=hexCenter(hex.q,hex.r);for(var ci=0;ci<6;ci++){var pt=hexCorner(hc.x,hc.y,ci);if(Math.hypot(pt.x-G.verts[best].x,pt.y-G.verts[best].y)<hexSize*.3){G.players[G.turn].res[hex.type]++;break;}}}}
        render();}}
    else{var be=findClosestEdge(mx,my,hexSize*.2);if(be>=0){var e=G.edges[be];if(e.player>=0)return;
        var lastS=-1;for(var vi=G.verts.length-1;vi>=0;vi--)if(G.verts[vi].player===G.turn&&G.verts[vi].building==='settlement'){var sc=0;for(var vj=0;vj<=vi;vj++)if(G.verts[vj].player===G.turn&&G.verts[vj].building)sc++;if(sc===expected){lastS=vi;break;}}
        if(lastS>=0){var va=G.verts[e.a],vb=G.verts[e.b],sv=G.verts[lastS];if(Math.hypot(va.x-sv.x,va.y-sv.y)<hexSize*.3||Math.hypot(vb.x-sv.x,vb.y-sv.y)<hexSize*.3){e.player=G.turn;G.players[G.turn].roads++;log(G.players[G.turn].name+' placed a road.');G.setupPlacements++;advanceSetup();render();}}}}
}
function advanceSetup(){
    var si=G.setupPlacements;
    if(si<G.setupOrder.length){
        G.turn=G.setupOrder[si];
        if(si===numPlayers)G.phase='setup2';
        log(G.players[G.turn].name+'\'s turn to place.');
        render();
        if(G.players[G.turn].isBot)setTimeout(botSetup,600);
    } else {
        G.phase='roll';G.turn=0;
        log('🎲 Setup complete! '+G.players[0].name+' rolls first.');
        render();if(G.players[0].isBot)setTimeout(botTurn,600);
    }
}
function canPlaceSetup(vi){var v=G.verts[vi];if(v.building)return false;if(v.hexes.length===0)return false;var md=hexSize*1.1;for(var i=0;i<G.verts.length;i++){if(i===vi)continue;if(G.verts[i].building&&Math.hypot(G.verts[i].x-v.x,G.verts[i].y-v.y)<md)return false;}return true;}

// ===== GAME ACTIONS =====
function rollDice(){
    if(G.phase!=='roll'||G.players[G.turn].isBot)return;
    var d1=1+~~(Math.random()*6),d2=1+~~(Math.random()*6);G.dice=[d1,d2];var sum=d1+d2;
    document.getElementById('die1').innerText=d1;document.getElementById('die2').innerText=d2;
    document.getElementById('die1').classList.add('rolling');document.getElementById('die2').classList.add('rolling');
    setTimeout(function(){document.getElementById('die1').classList.remove('rolling');document.getElementById('die2').classList.remove('rolling');},500);
    document.getElementById('roll-sum').innerText='= '+sum;
    log('🎲 '+G.players[G.turn].name+' rolled '+d1+'+'+d2+'='+sum);
    if(sum===7){for(var p=0;p<numPlayers;p++){var tot=totalRes(p);if(tot>7){var disc=~~(tot/2);for(var d=0;d<disc;d++){var ow=RES.filter(function(r){return G.players[p].res[r]>0;});if(ow.length)G.players[p].res[ow[~~(Math.random()*ow.length)]]--;}log(G.players[p].name+' discarded '+disc);}}G.phase='robber';log('🥷 Move the robber!');}
    else{distributeResources(sum);G.phase='build';}render();
}
function handleRobberClick(mx,my){
    for(var hi=0;hi<G.hexes.length;hi++){var h=G.hexes[hi],c=hexCenter(h.q,h.r);
        if(Math.hypot(mx-c.x,my-c.y)<hexSize*.6){if(hi===G.robber)continue;G.robber=hi;log('🥷 Robber moved to '+RES_E[h.type]+' '+h.num);
            // Steal from an opponent on that hex
            var victims=[];G.buildings.forEach(function(b){if(b.player!==G.turn&&b.adjacentHexes.indexOf(hi)>=0&&totalRes(b.player)>0&&victims.indexOf(b.player)<0)victims.push(b.player);});
            if(victims.length>0){var opp=victims[~~(Math.random()*victims.length)];var ow=RES.filter(function(r){return G.players[opp].res[r]>0;});if(ow.length){var r=ow[~~(Math.random()*ow.length)];G.players[opp].res[r]--;G.players[G.turn].res[r]++;log(G.players[G.turn].name+' stole '+RES_E[r]+' from '+G.players[opp].name);}}
            G.phase='build';render();return;}}
}
function buildRoad(){if(G.phase!=='build'||G.players[G.turn].isBot)return;var cp=G.turn;if(!canAfford(cp,BUILD_COST.road)){log('❌ Not enough.');return;}
    var hv=G.edges.some(function(e){return e.player<0&&isConnected(e.idx,cp);});if(!hv){log('❌ No valid road spots.');return;}
    log('🛤️ Click edge. (click empty=cancel)');G.phase='placeroad';
    cvs.onclick=function(e){var r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;var ei=findClosestEdge(mx,my,hexSize*.25);
        if(ei>=0&&G.edges[ei].player<0&&isConnected(ei,cp)){pay(cp,BUILD_COST.road);G.edges[ei].player=cp;G.players[cp].roads++;log(G.players[cp].name+' built a road.');checkLongestRoad();G.phase='build';restoreClickHandler();checkWin();render();}else cancelPlacement();};render();}
function buildSettlement(){if(G.phase!=='build'||G.players[G.turn].isBot)return;var cp=G.turn;if(!canAfford(cp,BUILD_COST.settlement)){log('❌ Not enough.');return;}
    var hv=false;for(var vi=0;vi<G.verts.length;vi++)if(canBuildSettlement(vi,cp)){hv=true;break;}if(!hv){log('❌ No valid spots.');return;}
    log('🏠 Click vertex. (click empty=cancel)');G.phase='placesettlement';
    cvs.onclick=function(e){var r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;var vi=findClosestVert(mx,my,hexSize*.3);
        if(vi>=0&&canBuildSettlement(vi,cp)){pay(cp,BUILD_COST.settlement);registerBuilding(vi,cp,'settlement');G.players[cp].settlements++;log(G.players[cp].name+' built a settlement!');G.phase='build';restoreClickHandler();checkWin();render();}else cancelPlacement();};render();}
function buildCity(){if(G.phase!=='build'||G.players[G.turn].isBot)return;var cp=G.turn;if(!canAfford(cp,BUILD_COST.city)){log('❌ Not enough.');return;}
    var hv=G.verts.some(function(v){return v.building==='settlement'&&v.player===cp;});if(!hv){log('❌ No settlements to upgrade.');return;}
    log('🏰 Click settlement. (click empty=cancel)');G.phase='placecity';
    cvs.onclick=function(e){var r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;var vi=findClosestVert(mx,my,hexSize*.3);
        if(vi>=0&&G.verts[vi].building==='settlement'&&G.verts[vi].player===cp){pay(cp,BUILD_COST.city);registerBuilding(vi,cp,'city');G.players[cp].settlements--;G.players[cp].cities++;log(G.players[cp].name+' upgraded to city!');G.phase='build';restoreClickHandler();checkWin();render();}else cancelPlacement();};render();}
function buyDevCard(){if(G.phase!=='build'||G.players[G.turn].isBot)return;var cp=G.turn;if(!canAfford(cp,BUILD_COST.devcard)){log('❌ Not enough.');return;}if(G.devDeck.length===0){log('❌ No cards left.');return;}
    pay(cp,BUILD_COST.devcard);var card=G.devDeck.pop();G.players[cp].devCards.push(card);log(G.players[cp].name+' bought '+devCardName(card));checkWin();render();}
function playDevCard(idx){if(G.phase!=='build'||G.players[G.turn].isBot)return;var cp=G.turn,card=G.players[cp].devCards[idx];
    if(card==='vp'){log('VP cards auto-count!');return;}G.players[cp].devCards.splice(idx,1);
    if(card==='knight'){G.players[cp].usedKnights++;checkLargestArmy();G.phase='robber';log(G.players[cp].name+' played Knight! 🥷');render();}
    else if(card==='roadbuild'){G.players[cp].res.wood+=2;G.players[cp].res.brick+=2;log(G.players[cp].name+' Road Building! 🛤️');render();}
    else if(card==='yearofplenty'){showYearOfPlenty();}
    else if(card==='monopoly'){showMonopoly();}}
function cancelPlacement(){G.phase='build';restoreClickHandler();log('↩️ Cancelled.');render();}
function endTurn(){if(G.phase!=='build')return;G.turn=(G.turn+1)%numPlayers;G.phase='roll';
    log(G.players[G.turn].name+'\'s turn.');render();if(G.players[G.turn].isBot)setTimeout(botTurn,600);}

// ===== TRADE =====
function openTrade(){if(G.phase!=='build'||G.players[G.turn].isBot)return;var cp=G.turn,m=document.getElementById('modal');
    var h='<h2>🤝 Trade 4:1</h2><div class="trade-row">Give: <select id="trade-give">';
    RES.forEach(function(r){h+='<option value="'+r+'">'+RES_E[r]+' '+r+' ('+G.players[cp].res[r]+')</option>';});
    h+='</select></div><div class="trade-row">Get: <select id="trade-get">';
    RES.forEach(function(r){h+='<option value="'+r+'">'+RES_E[r]+' '+r+'</option>';});
    h+='</select></div><button onclick="executeTrade()">Trade</button> <button class="sec" onclick="closeModal()">Cancel</button>';
    m.innerHTML=h;document.getElementById('modal-overlay').classList.add('active');}
function executeTrade(){var cp=G.turn,g=document.getElementById('trade-give').value,gt=document.getElementById('trade-get').value;
    if(g===gt){alert('Same resource!');return;}if(G.players[cp].res[g]<4){alert('Need 4!');return;}
    G.players[cp].res[g]-=4;G.players[cp].res[gt]++;log(G.players[cp].name+' traded 4 '+RES_E[g]+'→1 '+RES_E[gt]);closeModal();render();}
function showYearOfPlenty(){var m=document.getElementById('modal');m.innerHTML='<h2>🎁 Year of Plenty</h2><div class="trade-row">1st: <select id="yop1">'+RES.map(function(r){return'<option value="'+r+'">'+RES_E[r]+'</option>';}).join('')+'</select></div><div class="trade-row">2nd: <select id="yop2">'+RES.map(function(r){return'<option value="'+r+'">'+RES_E[r]+'</option>';}).join('')+'</select></div><button onclick="doYOP()">Take!</button>';document.getElementById('modal-overlay').classList.add('active');}
function doYOP(){G.players[G.turn].res[document.getElementById('yop1').value]++;G.players[G.turn].res[document.getElementById('yop2').value]++;log(G.players[G.turn].name+' Year of Plenty!');closeModal();render();}
function showMonopoly(){var m=document.getElementById('modal');m.innerHTML='<h2>💰 Monopoly</h2><p>Steal ALL of one resource:</p><div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">'+RES.map(function(r){return'<button onclick="doMonopoly(\''+r+'\')">'+RES_E[r]+' '+r+'</button>';}).join('')+'</div>';document.getElementById('modal-overlay').classList.add('active');}
function doMonopoly(r){var cp=G.turn,stolen=0;for(var p=0;p<numPlayers;p++){if(p===cp)continue;stolen+=G.players[p].res[r];G.players[p].res[r]=0;}G.players[cp].res[r]+=stolen;log(G.players[cp].name+' Monopoly! +'+stolen+' '+RES_E[r]);closeModal();render();}
function closeModal(){document.getElementById('modal-overlay').classList.remove('active');}

// ===== HELPERS =====
function canAfford(p,cost){for(var r in cost)if(G.players[p].res[r]<cost[r])return false;return true;}
function canAlmostAfford(p,cost){var m=0;for(var r in cost)m+=Math.max(0,cost[r]-G.players[p].res[r]);return m>0&&m<=2;}
function getMissing(p,cost){var m=[];for(var r in cost){var n=cost[r]-G.players[p].res[r];for(var i=0;i<n;i++)m.push(r);}return m;}
function pay(p,cost){for(var r in cost)G.players[p].res[r]-=cost[r];}
function totalRes(p){var t=0;RES.forEach(function(r){t+=G.players[p].res[r];});return t;}
function pName(p){return G.players[p]?G.players[p].name:'?';}
function devCardName(c){return{knight:'Knight 🥷',vp:'VP 🎉',roadbuild:'Road Building 🛤️',yearofplenty:'Year of Plenty 🎁',monopoly:'Monopoly 💰'}[c]||c;}
function log(msg){G.log.unshift(msg);if(G.log.length>60)G.log.pop();var b=document.getElementById('log-box');if(b)b.innerHTML=G.log.map(function(l){return'<div>'+l+'</div>';}).join('');}
function findClosestVert(mx,my,md){var b=-1,bd=md;for(var vi=0;vi<G.verts.length;vi++){var d=Math.hypot(G.verts[vi].x-mx,G.verts[vi].y-my);if(d<bd){bd=d;b=vi;}}return b;}
function findClosestEdge(mx,my,md){var b=-1,bd=md;for(var ei=0;ei<G.edges.length;ei++){var e=G.edges[ei],va=G.verts[e.a],vb=G.verts[e.b],cx=(va.x+vb.x)/2,cy=(va.y+vb.y)/2,d=Math.hypot(cx-mx,cy-my);if(d<bd){bd=d;b=ei;}}return b;}
function isConnected(ei,p){var e=G.edges[ei],va=G.verts[e.a],vb=G.verts[e.b],th=hexSize*.3;
    for(var end=0;end<2;end++){var vx=end===0?va.x:vb.x,vy=end===0?va.y:vb.y;
        for(var bi=0;bi<G.buildings.length;bi++){if(G.buildings[bi].player===p){var bv=G.verts[G.buildings[bi].vertIdx];if(Math.hypot(bv.x-vx,bv.y-vy)<th)return true;}}
        for(var ei2=0;ei2<G.edges.length;ei2++){if(ei2===ei||G.edges[ei2].player!==p)continue;var e2a=G.verts[G.edges[ei2].a],e2b=G.verts[G.edges[ei2].b];if(Math.hypot(e2a.x-vx,e2a.y-vy)<th||Math.hypot(e2b.x-vx,e2b.y-vy)<th)return true;}}return false;}
function canBuildSettlement(vi,p){var v=G.verts[vi];if(v.building)return false;var md=hexSize*1.1;for(var i=0;i<G.verts.length;i++){if(i===vi)continue;if(G.verts[i].building&&Math.hypot(G.verts[i].x-v.x,G.verts[i].y-v.y)<md)return false;}
    if(G.phase!=='setup1'&&G.phase!=='setup2'){var th=hexSize*.3,conn=G.edges.some(function(e){if(e.player!==p)return false;var ea=G.verts[e.a],eb=G.verts[e.b];return Math.hypot(ea.x-v.x,ea.y-v.y)<th||Math.hypot(eb.x-v.x,eb.y-v.y)<th;});if(!conn)return false;}return true;}
function checkLongestRoad(){for(var p=0;p<numPlayers;p++)G.players[p].longestRoad=false;var best=-1,bestP=-1;for(var p=0;p<numPlayers;p++){var l=calcLongestRoad(p);if(l>=5&&l>best){best=l;bestP=p;}}if(bestP>=0)G.players[bestP].longestRoad=true;}
function calcLongestRoad(p){var pEdges=G.edges.filter(function(e){return e.player===p;});if(pEdges.length===0)return 0;var best=0;
    function dfs(vi,vis,depth){if(depth>best)best=depth;for(var i=0;i<pEdges.length;i++){var e=pEdges[i];if(vis[e.idx])continue;var next=-1;if(e.a===vi)next=e.b;else if(e.b===vi)next=e.a;if(next<0)continue;if(G.verts[next].building&&G.verts[next].player!==p)continue;vis[e.idx]=true;dfs(next,vis,depth+1);vis[e.idx]=false;}}
    pEdges.forEach(function(e){var v={};v[e.idx]=true;dfs(e.b,v,1);v={};v[e.idx]=true;dfs(e.a,v,1);});return best;}
function checkLargestArmy(){for(var p=0;p<numPlayers;p++)G.players[p].largestArmy=false;var best=-1,bestP=-1;for(var p=0;p<numPlayers;p++){if(G.players[p].usedKnights>=3&&G.players[p].usedKnights>best){best=G.players[p].usedKnights;bestP=p;}}if(bestP>=0)G.players[bestP].largestArmy=true;}
function calcVP(p){var vp=G.players[p].settlements+G.players[p].cities*2;if(G.players[p].longestRoad)vp+=2;if(G.players[p].largestArmy)vp+=2;vp+=G.players[p].devCards.filter(function(c){return c==='vp';}).length;return vp;}
function checkWin(){for(var p=0;p<numPlayers;p++){G.players[p].vp=calcVP(p);if(G.players[p].vp>=10){G.phase='gameover';log('🎉 '+G.players[p].name+' WINS! '+G.players[p].vp+' VP!');showWinModal(p);return;}}}
function showWinModal(p){var m=document.getElementById('modal');m.innerHTML='<h2>🎉 '+G.players[p].name+' WINS!</h2><p>'+G.players[p].vp+' Victory Points!</p><button onclick="closeModal();document.getElementById(\'start-screen\').style.display=\'\';document.getElementById(\'game-wrap\').style.display=\'none\';">New Game</button>';document.getElementById('modal-overlay').classList.add('active');}
function handleHover(mx,my){var tip=document.getElementById('tooltip');for(var hi=0;hi<G.hexes.length;hi++){var h=G.hexes[hi],c=hexCenter(h.q,h.r);if(Math.hypot(mx-c.x,my-c.y)<hexSize*.5){tip.style.display='block';tip.style.left=(mx+10)+'px';tip.style.top=(my-20)+'px';tip.innerText=RES_E[h.type]+' '+h.type+(h.num?' ('+h.num+')':'')+(G.robber===hi?' 🥷':'');return;}}tip.style.display='none';}

// ===== UI UPDATE — ALWAYS SHOWS ALL PLAYERS =====
function updateUI(){
    var pp=document.getElementById('player-panels');
    var h='';
    for(var p=0;p<numPlayers;p++){
        var pl=G.players[p];pl.vp=calcVP(p);var dk=document.body.classList.contains('dark');
        var col=dk?PCOLORS_DARK[p]:pl.color;var isTurn=G.turn===p;
        h+='<div class="pp'+(isTurn?' active-turn':'')+'" style="border-left:4px solid '+col+';">';
        h+='<div class="pp-head"><span class="pp-name" style="color:'+col+';">'+pl.name+(pl.isBot?' 🤖':'')+' </span>';
        h+='<div class="pp-badges">';
        if(pl.longestRoad)h+='<span class="pp-badge">🛤️ Road</span>';
        if(pl.largestArmy)h+='<span class="pp-badge">🥷 Army</span>';
        h+='</div>';
        h+='<span class="pp-vp">'+pl.vp+'/10 VP</span></div>';
        h+='<div class="pp-res">';
        RES.forEach(function(r){h+='<span class="pp-ri">'+RES_E[r]+pl.res[r]+'</span>';});
        h+='<span class="pp-ri" style="color:#aaa;">🃏'+pl.devCards.length+'</span>';
        h+='<span class="pp-ri" style="color:#aaa;">🛤️'+pl.roads+'</span>';
        h+='<span class="pp-ri" style="color:#aaa;">🥷'+pl.usedKnights+'</span>';
        h+='</div></div>';
    }
    pp.innerHTML=h;
    // Actions for current human
    var cp=G.turn,isH=!G.players[cp].isBot;
    var ag=document.getElementById('act-grid');
    document.getElementById('act-title').innerText='🎮 '+G.players[cp].name+'\'s Turn';
    var inB=G.phase==='build'&&isH,inR=G.phase==='roll'&&isH;

        '<button class="act-btn" onclick="openTrade()" '+(inB?'':'disabled')+'><span class="ae">🤝</span>Trade</button>'+
        '<button class="act-btn" onclick="endTurn()" '+(inB?'':'disabled')+'><span class="ae">⏭️</span>End Turn</button>';}
    // Dev cards
    var dp=document.getElementById('dev-panel'),dc=document.getElementById('dev-cards');

// ===== BOT AI =====
function botTurn(){if(G.players[G.turn].isBot===false||G.phase==='gameover')return;var p=G.turn;
    var d1=1+~~(Math.random()*6),d2=1+~~(Math.random()*6);G.dice=[d1,d2];var sum=d1+d2;
    document.getElementById('die1').innerText=d1;document.getElementById('die2').innerText=d2;document.getElementById('roll-sum').innerText='= '+sum;
    log('🎲 '+G.players[p].name+' rolled '+d1+'+'+d2+'='+sum);
    if(sum===7){for(var pp=0;pp<numPlayers;pp++){var tot=totalRes(pp);if(tot>7){var disc=~~(tot/2);for(var d=0;d<disc;d++){var ow=RES.filter(function(r){return G.players[pp].res[r]>0;});if(ow.length)G.players[pp].res[ow[~~(Math.random()*ow.length)]]--;}}}
        var bH=-1,bS=-1;for(var hi=0;hi<G.hexes.length;hi++){if(hi===G.robber||G.hexes[hi].type==='desert')continue;var sc=0;G.buildings.forEach(function(b){if(b.player!==p&&b.adjacentHexes.indexOf(hi)>=0)sc+=probDots(G.hexes[hi].num)*(b.type==='city'?3:1);});G.buildings.forEach(function(b){if(b.player===p&&b.adjacentHexes.indexOf(hi)>=0)sc-=probDots(G.hexes[hi].num)*2;});if(sc>bS){bS=sc;bH=hi;}}
        if(bH>=0){G.robber=bH;var victims=[];G.buildings.forEach(function(b){if(b.player!==p&&b.adjacentHexes.indexOf(bH)>=0&&totalRes(b.player)>0&&victims.indexOf(b.player)<0)victims.push(b.player);});
            if(victims.length>0){var opp=victims[0];var maxR='',maxA=0;RES.forEach(function(r){if(G.players[opp].res[r]>maxA){maxA=G.players[opp].res[r];maxR=r;}});if(maxR){G.players[opp].res[maxR]--;G.players[p].res[maxR]++;}}}
    }else distributeResources(sum);
    render();setTimeout(function(){botBuild(p);G.turn=(G.turn+1)%numPlayers;G.phase='roll';checkWin();log(G.players[G.turn].name+'\'s turn.');render();if(G.players[G.turn].isBot)setTimeout(botTurn,600);},500);
}
function scoreSpot(vi){var v=G.verts[vi],sc=0,types={};
    for(var hi=0;hi<G.hexes.length;hi++){var hex=G.hexes[hi];if(hex.type==='desert')continue;var hc=hexCenter(hex.q,hex.r);
        for(var ci=0;ci<6;ci++){var pt=hexCorner(hc.x,hc.y,ci);if(Math.hypot(pt.x-v.x,pt.y-v.y)<hexSize*.3){sc+=probDots(hex.num)*2;types[hex.type]=(types[hex.type]||0)+probDots(hex.num);if(hex.num===6||hex.num===8)sc+=3;break;}}}
    sc+=Object.keys(types).length*4;if(types.ore)sc+=3;if(types.wheat)sc+=3;return sc;}
function botBuild(p){
    // Play dev cards
    for(var di=G.players[p].devCards.length-1;di>=0;di--){var c=G.players[p].devCards[di];if(c==='vp')continue;
        if(c==='knight'){G.players[p].devCards.splice(di,1);G.players[p].usedKnights++;checkLargestArmy();var bH=-1,bS=-1;for(var hi=0;hi<G.hexes.length;hi++){if(hi===G.robber||G.hexes[hi].type==='desert')continue;var sc=0;G.buildings.forEach(function(b){if(b.player!==p&&b.adjacentHexes.indexOf(hi)>=0)sc+=probDots(G.hexes[hi].num)*(b.type==='city'?3:1);});if(sc>bS){bS=sc;bH=hi;}}if(bH>=0)G.robber=bH;log(G.players[p].name+' Knight! 🥷');break;}
        if(c==='roadbuild'){G.players[p].devCards.splice(di,1);for(var rb=0;rb<2;rb++){var be=findBotRoad(p);if(be>=0){G.edges[be].player=p;G.players[p].roads++;}}checkLongestRoad();log(G.players[p].name+' Road Building! 🛤️');break;}
        if(c==='yearofplenty'){G.players[p].devCards.splice(di,1);var need=getMissing(p,canAlmostAfford(p,BUILD_COST.city)?BUILD_COST.city:BUILD_COST.settlement);G.players[p].res[need[0]||'ore']++;G.players[p].res[need[1]||'wheat']++;log(G.players[p].name+' Year of Plenty! 🎁');break;}
        if(c==='monopoly'){G.players[p].devCards.splice(di,1);var maxR='',maxA=0;for(var op=0;op<numPlayers;op++){if(op===p)continue;RES.forEach(function(r){if(G.players[op].res[r]>maxA){maxA=G.players[op].res[r];maxR=r;}});}if(maxR&&maxA>=2){var stolen=0;for(var op=0;op<numPlayers;op++){if(op===p)continue;stolen+=G.players[op].res[maxR];G.players[op].res[maxR]=0;}G.players[p].res[maxR]+=stolen;log(G.players[p].name+' Monopoly! +'+stolen+' '+RES_E[maxR]);}break;}}
    // Trade
    for(var at=0;at<3;at++){var tc=null;if(canAlmostAfford(p,BUILD_COST.city))tc=BUILD_COST.city;else if(canAlmostAfford(p,BUILD_COST.settlement))tc=BUILD_COST.settlement;else if(canAlmostAfford(p,BUILD_COST.devcard))tc=BUILD_COST.devcard;if(!tc)break;var miss=getMissing(p,tc);if(!miss.length)break;var traded=false;RES.forEach(function(r){if(traded)return;var needed=tc[r]||0;if(G.players[p].res[r]>=needed+4){G.players[p].res[r]-=4;G.players[p].res[miss[0]]++;traded=true;}});if(!traded)break;}
    // City
    if(canAfford(p,BUILD_COST.city)){var bC=-1,bCS=-1;for(var vi=0;vi<G.verts.length;vi++){if(G.verts[vi].player===p&&G.verts[vi].building==='settlement'){var s=scoreSpot(vi);if(s>bCS){bCS=s;bC=vi;}}}if(bC>=0){pay(p,BUILD_COST.city);registerBuilding(bC,p,'city');G.players[p].settlements--;G.players[p].cities++;log(G.players[p].name+' city! 🏰');}}
    // Settlement
    if(canAfford(p,BUILD_COST.settlement)){var bS2=-1,bSS=-1;for(var vi=0;vi<G.verts.length;vi++){if(canBuildSettlement(vi,p)){var s=scoreSpot(vi);if(s>bSS){bSS=s;bS2=vi;}}}if(bS2>=0){pay(p,BUILD_COST.settlement);registerBuilding(bS2,p,'settlement');G.players[p].settlements++;log(G.players[p].name+' settlement! 🏠');}}
    // Roads
    for(var rr=0;rr<2;rr++){if(!canAfford(p,BUILD_COST.road))break;var be=findBotRoad(p);if(be>=0){pay(p,BUILD_COST.road);G.edges[be].player=p;G.players[p].roads++;log(G.players[p].name+' road. 🛤️');}else break;}
    // Dev card
    if(canAfford(p,BUILD_COST.devcard)&&G.devDeck.length>0&&(G.players[p].usedKnights>=2||totalRes(p)>=8||calcVP(p)>=7)){pay(p,BUILD_COST.devcard);var card=G.devDeck.pop();G.players[p].devCards.push(card);if(card==='knight'){G.players[p].devCards.pop();G.players[p].usedKnights++;checkLargestArmy();log(G.players[p].name+' Knight! 🥷');}else log(G.players[p].name+' bought dev card.');}
    checkLongestRoad();checkLargestArmy();
}
function findBotRoad(p){var bE=-1,bS=-1;for(var ei=0;ei<G.edges.length;ei++){if(G.edges[ei].player>=0||!isConnected(ei,p))continue;var va=G.verts[G.edges[ei].a],vb=G.verts[G.edges[ei].b],sc=0;
    for(var vi=0;vi<G.verts.length;vi++){if(G.verts[vi].building)continue;var v=G.verts[vi],d=Math.min(Math.hypot(v.x-va.x,v.y-va.y),Math.hypot(v.x-vb.x,v.y-vb.y));if(d<hexSize*3)sc+=scoreSpot(vi)/(1+d/hexSize);}sc+=2;if(sc>bS){bS=sc;bE=ei;}}return bE;}
function botSetup(){if(!G.players[G.turn].isBot)return;var p=G.turn;

    if(bV>=0){registerBuilding(bV,p,'settlement');G.players[p].settlements++;log(G.players[p].name+' settlement.');
        if(G.phase==='setup2'){for(var hi=0;hi<G.hexes.length;hi++){var hex=G.hexes[hi];if(hex.type==='desert')continue;var hc=hexCenter(hex.q,hex.r);for(var ci=0;ci<6;ci++){var pt=hexCorner(hc.x,hc.y,ci);if(Math.hypot(pt.x-G.verts[bV].x,pt.y-G.verts[bV].y)<hexSize*.3){G.players[p].res[hex.type]++;break;}}}}
        render();setTimeout(function(){var bE=-1,bES=-1;for(var ei=0;ei<G.edges.length;ei++){var e=G.edges[ei];if(e.player>=0)continue;var va=G.verts[e.a],vb=G.verts[e.b];var dA=Math.hypot(va.x-G.verts[bV].x,va.y-G.verts[bV].y),dB=Math.hypot(vb.x-G.verts[bV].x,vb.y-G.verts[bV].y);if(dA>hexSize*.3&&dB>hexSize*.3)continue;var far=dA<dB?vb:va;var es=100-Math.hypot(far.x-CW/2,far.y-CH/2);if(es>bES){bES=es;bE=ei;}}
            if(bE>=0){G.edges[bE].player=p;G.players[p].roads++;log(G.players[p].name+' road.');G.setupPlacements++;advanceSetup();render();}},500);}
}
